<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmic Portfolio</title>
    <meta
      name="description"
      content="Creative astronomer portfolio with research constellations, observing logbook, and a cosmic dashboard."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="bg-layer">
      <div class="bg-slide is-active" id="bg-a"></div>
      <div class="bg-slide" id="bg-b"></div>
      <div class="bg-fade"></div>
    </div>
    <div class="starfield"></div>
    <div class="nebula"></div>

    <main class="page">
      <header class="hero">
        <div class="hero-copy">
          <p class="kicker">Astronomy | Transients | Data Intelligence</p>
          <h1 id="profile-name">Your Name</h1>
          <p id="profile-role" class="role">Astronomer</p>
          <p id="profile-tagline" class="tagline">Cosmic storyteller and data navigator.</p>
          <p id="profile-description" class="bio">
            A short bio lives in script.js.
          </p>
          <div class="hero-actions">
            <a class="btn primary" id="cv-link" href="assets/resume.pdf">Download CV</a>
            <a class="btn ghost" id="contact-link" href="#panels">Explore</a>
          </div>
          <div class="hero-meta" id="hero-meta"></div>
          <div class="socials" id="social-links"></div>
        </div>

        <div class="hero-visual">
          <div class="portrait-shell">
            <div class="orbit orbit-left" id="orbit"></div>
            <div class="portrait-card">
              <img
                id="profile-photo"
                class="profile-photo"
                src="profile.jpeg"
                alt="Profile photo"
              />
            </div>
          </div>
        </div>
      </header>

      <section class="panel wide" id="panels">
        <h2>Explore</h2>
        <p class="panel-intro">Click a panel to open details.</p>
        <div class="panel-grid" id="panel-grid"></div>
      </section>

      <section class="panel wide" id="results">
        <h2>Results</h2>
        <p class="panel-intro">Scientific + outreach snapshots that bring the sky to people.</p>
        <div class="results-grid" id="results-grid"></div>
      </section>
    </main>

    <section class="modal-wrap" id="panel-modal" hidden aria-hidden="true">
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" id="modal-close" type="button" aria-label="Close panel">
          Close
        </button>
        <h3 id="modal-title">Panel Title</h3>
        <p id="modal-intro" class="modal-intro"></p>
        <div id="modal-content" class="modal-content"></div>
      </article>
    </section>
  </body>
</html>
